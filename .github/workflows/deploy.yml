name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore

      - name: Publish
        run: dotnet publish src/HslBikeApp/HslBikeApp.csproj -c Release -o release

      - name: Inject API key
        run: |
          sed -i 's|"DigitransitSubscriptionKey": ""|"DigitransitSubscriptionKey": "${{ secrets.DIGITRANSIT_SUBSCRIPTION_KEY }}"|' release/wwwroot/appsettings.json

      - name: Rewrite base href
        run: sed -i 's|<base href="/hsl-bike-app/" />|<base href="/hsl-bike-app/" />|g' release/wwwroot/index.html

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Copy 404.html
        run: cp release/wwwroot/404.html release/wwwroot/404.html 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
