name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore hsl-bike-app.slnx

      - name: Build
        run: dotnet build hsl-bike-app.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test hsl-bike-app.slnx --no-build --configuration Release --verbosity normal
